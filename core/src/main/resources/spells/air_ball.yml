id: 'air_ball'
display_name: '&fAir Ball'
description:
  - '&7Channel air beneath you to create'
  - '&7a spherical cushion of wind that'
  - '&7allows you to glide across terrain.'
  - '&7Jump to boost upward!'
# WHETHER THE PLUGIN SHOULD LOAD THE SPELL. DEFAULT: TRUE
enabled: true

# ELEMENT TYPE
element: 'AIR'

# THE CASTING CODE. 'R' FOR RIGHT CLICK, 'L' FOR LEFT CLICK, 'S' FOR HAND SWAP
code: 'SSRSS'

# THE MAGIC CIRCLE REQUIRED TO CAST
level: 4

# COOLDOWN BEFORE CASTING AGAIN (SECONDS)
cooldown: 20

# BASE CAST TIME (SECONDS)
cast_time: 0.5

# MANA COST
mana_cost: 40

# MAXIMUM MASTERY ACHIEVABLE. NOT RECOMMENDED TO CHANGE
maximum_mastery: 100

# AIR BALL CONFIGURATION
movement_speed: 0.3
jump_boost_strength: 1.2
mana_drain_per_second: 2.0

# BASE POWER (used if air ball damages something)
power: 1.0

#THE COLOR OF THE SPELL MASTERY BOSSBAR. OPTIONS ARE: RED, BLUE, YELLOW, PINK, PURPLE, WHITE AND GREEN
mastery_bar_color: 'WHITE'

#THE ITEM THAT APPEARS IN THE /SPELLS GUI
gui_item: 'GHAST_TEAR'
