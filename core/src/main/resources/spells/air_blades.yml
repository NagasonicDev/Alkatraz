id: 'air_blades'
display_name: '&fAir Blades'
description:
  - '&7Arm yourself with blades of wind,'
  - '&7releasing a fan of cutting'
  - '&7air towards your foes.'

# WHETHER THE PLUGIN SHOULD LOAD THE SPELL. DEFAULT: TRUE
enabled: true

# ELEMENT TYPE
element: 'AIR'

# THE CASTING CODE. 'R' FOR RIGHT CLICK, 'L' FOR LEFT CLICK, 'S' FOR HAND SWAP
code: 'RLSRS'

# THE MAGIC CIRCLE REQUIRED TO CAST
level: 2

# COOLDOWN BEFORE CASTING AGAIN (SECONDS)
cooldown: 6

# BASE CAST TIME (SECONDS)
cast_time: 0.8

# MANA COST
mana_cost: 40

# MAXIMUM MASTERY ACHIEVABLE. NOT RECOMMENDED TO CHANGE
maximum_mastery: 100

# BASE POWER (DAMAGE PER BLADE HIT)
power: 4.5

# HOW FAST EACH BLADE TRAVELS (BLOCKS PER TICK)
blade_speed: 1.2

# MAXIMUM DISTANCE A BLADE WILL TRAVEL (BLOCKS)
blade_range: 24.0

# TOTAL HORIZONTAL SPREAD OF THE BLADE FAN (DEGREES)
# Only applies when firing 3 or 5 blades; a single blade always fires straight.
blade_spread: 30.0

# THE COLOR OF THE SPELL MASTERY BOSSBAR. OPTIONS ARE: RED, BLUE, YELLOW, PINK, PURPLE, WHITE AND GREEN
mastery_bar_color: 'WHITE'

# THE ITEM THAT APPEARS IN THE /SPELLS GUI
gui_item: 'FEATHER'
