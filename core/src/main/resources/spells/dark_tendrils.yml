id: 'dark_tendrils'
display_name: '&5Dark Tendrils'
description:
  - '&7Summon tendrils of dark mana that'
  - '&7hunt nearby targets and inflict'
  - '&7debilitating effects.'
# WHETHER THE PLUGIN SHOULD LOAD THE SPELL. DEFAULT: TRUE
enabled: true

# ELEMENT TYPE
element: 'DARK'

# THE CASTING CODE. 'R' FOR RIGHT CLICK, 'L' FOR LEFT CLICK, 'S' FOR HAND SWAP
code: 'RLRLS'

# THE MAGIC CIRCLE REQUIRED TO CAST
level: 3

# COOLDOWN BEFORE CASTING AGAIN (SECONDS)
cooldown: 15

# BASE CAST TIME (SECONDS)
cast_time: 1.5

# MANA COST
mana_cost: 50

# MAXIMUM MASTERY ACHIEVABLE. NOT RECOMMENDED TO CHANGE
maximum_mastery: 200

# BASE POWER (DAMAGE IF IT HITS)
power: 4.0

# TENDRIL CONFIGURATION
tendril_duration: 30
tendril_speed: 0.3
lock_on_speed: 0.8
lock_on_range: 10.0
effect_duration: 5

#THE COLOR OF THE SPELL MASTERY BOSSBAR. OPTIONS ARE: RED, BLUE, YELLOW, PINK, PURPLE, WHITE AND GREEN
mastery_bar_color: 'PURPLE'

#THE ITEM THAT APPEARS IN THE /SPELLS GUI
gui_item: 'ENDER_EYE'
