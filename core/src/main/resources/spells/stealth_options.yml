# =============================================================================
# stealth_options.yml
# Spell option configuration for the Stealth spell.
#
# Structure overview:
#   options:
#     <option-id>:
#       description:   <string>
#       icon:          <Material name>
#       default_index: <int>   # 0-based index into 'values' list order
#       values:
#         <value-id>:
#           display_name: <string>
#           description:  <string>
#           icon:         <Material name>
#           value_type:   int | double | float | boolean | string | auto
#           value:        <typed value>
#           requirements: [...]   # optional — list of requirement entries
#           impacts:      [...]   # optional — list of impact entries
#
# Requirement entry fields:
#   type: number_stat | boolean_stat | permission | option_value | composite
#
# Impact entry fields:
#   type: stat_modifier | mana_cost | tag
# =============================================================================
options:

  # ---------------------------------------------------------------------------
  # armor_invis — Whether armor is visible
  # ---------------------------------------------------------------------------
  armor_invis:
    description: "Whether armor is visible."
    icon: DIAMOND_CHESTPLATE
    default_index: 0

    values:

      armor_shown:
        display_name: "Armor Shown"
        description: "Armor is shown to other players."
        icon: ENDER_PEARL
        value_type: boolean
        value: false

      armor_hidden:
        display_name: "Armor Hidden"
        description: "Armor is hidden for other players"
        icon: BARRIER
        value_type: boolean
        value: true
        requirements:
          - type: number_stat
            stat: mastery_stealth
            minimum: 100
            description: "Requires 100 Stealth mastery"