options:

  radius:
    description: "Radius of the whirlpool."
    icon: WATER_BUCKET
    default_index: 1

    values:

      small:
        display_name: "Small"
        description: "4 block radius."
        icon: WATER_BUCKET
        value_type: double
        value: 4.0
        impacts:
          - type: stat_modifier
            stat: radius
            value: 4.0
            modifier: SET

      medium:
        display_name: "Medium"
        description: "5 block radius."
        icon: WATER_BUCKET
        value_type: double
        value: 5.0
        impacts:
          - type: stat_modifier
            stat: radius
            value: 5.0
            modifier: SET

      large:
        display_name: "Large"
        description: "7 block radius."
        icon: WATER_BUCKET
        value_type: double
        value: 7.0
        requirements:
          - type: number_stat
            stat: circleLevel
            minimum: 5
            description: "Requires Circle Level 5"
          - type: number_stat
            stat: mastery_whirlpool
            minimum: 60
            description: "Requires 60 Whirlpool mastery"
        impacts:
          - type: stat_modifier
            stat: radius
            value: 7.0
            modifier: SET

  duration:
    description: "How long the whirlpool lasts."
    icon: CLOCK
    default_index: 1

    values:

      brief:
        display_name: "Brief"
        description: "Lasts 5 seconds."
        icon: CLOCK
