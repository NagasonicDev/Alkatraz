options:

  barrier_size:
    description: "Size of the barrier."
    icon: SHIELD
    default_index: 0

    values:

      small:
        display_name: "Small"
        description: "3 block radius."
        icon: SHIELD
        value_type: double
        value: 3.0
        impacts:
          - type: stat_modifier
            stat: barrier_size
            value: 3.0
            modifier: SET

      medium:
        display_name: "Medium"
        description: "4 block radius."
        icon: SHIELD
        value_type: double
        value: 4.0
        impacts:
          - type: stat_modifier
            stat: barrier_size
            value: 4.0
            modifier: SET

      large:
        display_name: "Large"
        description: "5 block radius."
        icon: SHIELD
        value_type: double
        value: 5.0
        requirements:
          - type: number_stat
            stat: circleLevel
            minimum: 5
            description: "Requires Circle Level 5"
        impacts:
          - type: stat_modifier
            stat: barrier_size
            value: 5.0
            modifier: SET

  barrier_duration:
    description: "Duration of the barrier."
    icon: CLOCK
    default_index: 0

    values:

      short:
        display_name: "Short"
        description: "15 seconds."
        icon: CLOCK
        value_type: double
        value: 15.0
        impacts:
          - type: stat_modifier
            stat: barrier_duration
            value: 15.0
            modifier: SET

      medium:
        display_name: "Medium"
        description: "30 seconds."
        icon: CLOCK
        value_type: double
        value: 30.0
        impacts:
          - type: stat_modifier
            stat: barrier_duration
            value: 30.0
            modifier: SET

      long:
        display_name: "Long"
        description: "45 seconds."
        icon: CLOCK
        value_type: double
        value: 45.0
        requirements:
          - type: number_stat
            stat: circleLevel
            minimum: 5
            description: "Requires Circle Level 5"
        impacts:
          - type: stat_modifier
            stat: barrier_duration
            value: 45.0
            modifier: SET

  follow_player:
    description: "Toggle whether the barrier moves with you."
    icon: FEATHER
    default_index: 0
    values:
      stationary:
        display_name: "Stationary"
        description: "Barrier stays in place after casting."
        icon: ANVIL
        value_type: double
        value: 0.0
        impacts:
          - type: stat_modifier
            stat: follow_player
            value: 0.0
            modifier: SET
      mobile:
        display_name: "Mobile"
        description: "Barrier follows you as you move."
        icon: FEATHER
        value_type: double
        value: 1.0
        requirements:
          - type: number_stat
            stat: mastery_wind_barrier
            minimum: 150
            description: "Requires max Wind Barrier mastery"
        impacts:
          - type: stat_modifier
            stat: follow_player
            value: 1.0
            modifier: SET
