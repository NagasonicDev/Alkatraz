id: 'wind_vortex'
display_name: '&fWind Vortex'
description:
  - '&7Create a powerful vortex of wind'
  - '&7that pulls enemies toward you.'
  - '&7Enemies caught in the vortex take'
  - '&7damage and are left vulnerable.'
# WHETHER THE PLUGIN SHOULD LOAD THE SPELL. DEFAULT: TRUE
enabled: true

# ELEMENT TYPE
element: 'AIR'

# THE CASTING CODE. 'R' FOR RIGHT CLICK, 'L' FOR LEFT CLICK, 'S' FOR HAND SWAP
code: 'SRLRS'

# THE MAGIC CIRCLE REQUIRED TO CAST
level: 2

# COOLDOWN BEFORE CASTING AGAIN (SECONDS)
cooldown: 8

# BASE CAST TIME (SECONDS)
cast_time: 1.0

# MANA COST
mana_cost: 30

# MAXIMUM MASTERY ACHIEVABLE. NOT RECOMMENDED TO CHANGE
maximum_mastery: 100

# BASE POWER (DAMAGE PER TICK)
power: 0.5

# VORTEX CONFIGURATION
vortex_duration: 5
vortex_radius: 8.0
pull_strength: 0.4
tick_rate: 1

#THE COLOR OF THE SPELL MASTERY BOSSBAR. OPTIONS ARE: RED, BLUE, YELLOW, PINK, PURPLE, WHITE AND GREEN
mastery_bar_color: 'WHITE'

#THE ITEM THAT APPEARS IN THE /SPELLS GUI
gui_item: 'FEATHER'
