        target: arcaneKnowledge
        amount: 5
        display: '+5 Arcane Knowledge.'
      max_mana:
        type: magic_stat
        target: maxMana
        amount: 10
        display: '+10 Maximum Mana.'
    unlocks:
      - 'Reveals the first elemental studies.'
    visibility:
      hidden_until_available: false

