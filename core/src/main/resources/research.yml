# Research definitions are rendered as directed acyclic graphs.
# Objectives are functional and update from gameplay events handled by ResearchObjectiveListener.

categories:
  magic:
    display_name: '&dMagic'
    icon: ENCHANTING_TABLE
  fire:
    display_name: '&cFire'
    icon: BLAZE_POWDER
  water:
    display_name: '&9Water'
    icon: HEART_OF_THE_SEA
  earth:
    display_name: '&2Earth'
    icon: MOSS_BLOCK
  air:
    display_name: '&fAir'
    icon: FEATHER
  light:
    display_name: '&eLight'
    icon: GLOWSTONE_DUST
  dark:
    display_name: '&8Dark'
    icon: ECHO_SHARD

nodes:
  awakened_focus:
    display_name: '&dAwakened Focus'
    category: magic
    icon: AMETHYST_SHARD
    research_points_cost: 0
    position: { x: 0, y: 0 }
