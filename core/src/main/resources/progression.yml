# Progression framework configuration.
#
# Arcane Knowledge is numeric progress. Circle Level is milestone progress
# evaluated through the requirement framework below.

arcane_knowledge:
  sources:
    spell_cast:
      enabled: true
      amount: 1
      circle_amounts:
        0: 1
        1: 2
        2: 4
        3: 7
        4: 14
        5: 26
        6: 50
        7: 94
        8: 179
        9: 340

circle:
  auto_advance: true
  levels:
    1:
      stat_points: 5
      max_mana: 200
      mana_regeneration: 2
      requirements:
        - type: arcane_knowledge
          amount: 300
        - type: spell_mastery
          spell: magic_missile
          mastery: 250
          description: "Requires max mastery Magic Missile"
    2:
      stat_points: 5
      max_mana: 400
      mana_regeneration: 2.5
      requirements:
        - type: arcane_knowledge
          amount: 1040
        - type: mastered_spell_count
          circle: 1
          count: 1
          description: "Requires 1 max-mastered 1st circle spell"
    3:
      stat_points: 7
      max_mana: 800
